# PoincaréBall Experiment Configuration
# ======================================
# Toggle `method` between "euclidean" and "poincare" and re-run

random_state: 42

# ── Data settings ────────────────────────────────────────────────
data:
  data_path: /kaggle/working/dataset
  max_samples_per_file: 100000
  max_samples_per_class: 100000
  hold_out: [Spoofing, Web_Attack, Reconnaissance, "SlowLoris.parquet"]
  scaling:
    method: "log_quantile"
    passthrough_features: [
        'Header-to-Total Ratio', 
        'SYN Flag Rate', 
        'ACK Flag Rate', 
        'FIN Flag Rate', 
        'RST Flag Rate', 
        'PSH Flag Rate', 
        'URG Flag Rate'
    ]
    quantile_n_quantiles: 1000
    quantile_distribution: "normal"
  validation_split: 0.2
  columns:
    Label: { role: "target" }
    Flow ID: { role: "drop" }
    Src IP: { role: "drop" }
    Src Port: { role: "drop" }
    Dst IP: { role: "drop" }
    Dst Port: { role: "drop" }
    Flow Start Time: { role: "drop" }
    Flow End Time: { role: "drop" }
    Attack Name: { role: "drop"}

# ── Shared backbone architecture ─────────────────────────────────
backbone:
  hidden_layers: [1024, 512, 256]           
  embedding_dim: 128                       
  activation: "relu"
  dropout_rate: 0.2

# ── Training hyperparameters ─────────────────────────────────────
training:
  epochs: 500
  batch_size: 2048
  learning_rate: 0.0005
  early_stopping_patience: 50
  reduce_lr_patience: 50                  
  reduce_lr_factor: 0.5
  min_learning_rate: 1.0e-06
  threshold_percentile: 95        ##        

# ── Method toggle ────────────────────────────────────────────────
method: "poincare"

# ── Euclidean-specific settings ──────────────────────────────────
euclidean:
  distance_metric: "squared_euclidean"
  distance_temperature: 0.1
  embedding_l2_normalize: true
  center_loss_radius: 0.8
  center_loss_weight: 0.1
  supcon_weight: 0.05
  supcon_temperature: 0.07 

# ── Poincaré-specific settings ───────────────────────────────────
poincare:
  curvature: 1.0
  prototype_placement_radius: 0.9
  push_margin: 1.5
  push_weight: 1.0
  origin_pull_weight: 0.15
  reconstruction_weight: 1.0

# ── Output paths & Plotting ──────────────────────────────────────
model_dir: "models"
results_dir: "results"

plots:
  save_training_plots: true
  max_samples: 20000
